<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amazon Clone</title>
    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Top Navbar -->
    <nav class="navbar navbar-expand-lg amazon-navbar">
      <div class="container-fluid px-3">
        <a class="navbar-brand text-white fw-bold fs-3" href="#">amazon</a>

        <button
          class="navbar-toggler text-white border-0"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarContent"
        >
          <i class="bi bi-list fs-2"></i>
        </button>

        <div class="collapse navbar-collapse" id="navbarContent">
          <form class="d-flex flex-grow-1 mx-lg-4 my-3 my-lg-0">
            <input
              class="form-control search-input"
              type="search"
              placeholder="Search Amazon"
            />
            <button class="btn search-btn" type="submit">
              <i class="bi bi-search"></i>
            </button>
          </form>

          <ul class="navbar-nav ms-auto align-items-lg-center">
            <li class="nav-item">
              <a class="nav-link text-white" href="#">Sign In</a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-white" href="#">Orders</a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-white position-relative" href="#">
                <i class="bi bi-cart3 fs-4"></i>
                <span class="cart-count">0</span>
              </a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Secondary Menu -->
    <div class="secondary-nav py-2 px-3">
      <div class="container-fluid d-flex flex-wrap gap-3 text-white small">
        <span><i class="bi bi-list"></i> All</span>
        <span>Today's Deals</span>
        <span>Customer Service</span>
        <span>Registry</span>
        <span>Gift Cards</span>
        <span>Sell</span>
         <span>Best Sellers</span>
        <span>Mobiles</span>
        <span>Fashion</span>
        <span>Electronics</span>
        
      </div>
    </div>

    <!-- Hero Section -->
    <section class="hero-section d-flex align-items-end">
      <div class="container pb-4">
        <div class="hero-text bg-white p-3 rounded shadow-sm text-center">
          Discover millions of products at great prices.
        </div>
      </div>
    </section>

    <!-- Product Categories -->
    <section class="py-5 bg-light">
      <div class="container">
        <div class="row g-4" id="productContainer"></div>
      </div>
    </section>

    <!-- Footer -->
    <footer class="footer text-white py-5">
      <div class="container text-center">
        <h5 class="mb-3">Amazon Clone</h5>
        <p class="mb-0">© 2026 Amazon Front Page Clone. All rights reserved.</p>
      </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom JS -->
    <script src="script.js"></script>
  </body>
</html>
